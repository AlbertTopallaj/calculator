<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <a href="index.html">
        <span class="title">Calculator For Real Mathematics</span>
        </a>
        <button class="burger">☰</button>
        <nav class="header-nav">
            <a href="login.html">Login</a>
            <a href="signup.html">Sign up</a>
            <a href="pro.html">Go Pro</a>
        </nav>
    </header>
   
</body>
  <div class="calculator">
    
    <div class="calculator-display" id="display">
      0 <!-- Standardvärde innan något skrivs in -->
    </div>

  </div>

  <section class="calculator-slider-section">
    <div class="calculator-slider">

        <div class="slides-container">

            <div class="slide" id="calc-slide-1">
                <h2 class="slide-title">Miniräknare 1</h2>
                <!-- Här lägger du in miniräknare 1 senare -->
            </div>

            <div class="slide" id="calc-slide-2">
                <h2 class="slide-title">Miniräknare 2</h2>
                <!-- Här lägger du in miniräknare 2 senare -->
            </div>

        </div>

        <button class="arrow left">&#10094;</button>
        <button class="arrow right">&#10095;</button>

        <div class="dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
        </div>

    </div>
</section>



</body>
<script src="./main.js"></script>
</html>
