<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>

<body>
<header class="header">
    <a href="index.html">
        <span class="title">Calculator For Real Mathematics</span>
    </a>
    <button class="burger">☰</button>
    <nav class="header-nav">
        <a href="#" onclick="openSignupModal()">Sign Up</a>
        <a href="#" onclick="openLoginModal()">Login</a>
        <a href="#" onclick="openSettingsModal()">Settings</a>
    </nav>
</header>

<div class="modal-overlay" id="loginOverlay">
    <div class="modal">
        <button class="btn-close" onclick="closeLoginModal()">X</button>
        <h2>Login</h2>

        <label for="login-username">Username</label>
        <input type="email" id="login-username" placeholder="Enter your email here...">

        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Enter your password here...">

        <button class="btn-login" onclick="handleLogin()">Login</button>
        <p class="login-error" id="login-error"></p>

    </div>
</div>

<div class="modal-overlay" id="logoutOverlay">
    <div class="modal">
        <h2>Are you sure you want to logout?</h2>
        <div class="logout-buttons">
        <button class="btn-yes">Yes</button>
        <button class="btn-no">No</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="signupOverlay">
    <div class="modal">
        <button class="btn-close" onclick="closeSignupModal()">X</button>
        <h2>Sign Up</h2>

        <label for="signup-username">Username</label>
        <input type="email" id="signup-username" placeholder="Enter your username here...">

        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="Enter your password here...">

        <button class="btn-login" onclick="handleSignup()">Sign up</button>
        <p class="signup-error" id="signup-error"></p>
    </div>
</div>

<div class="modal-overlay" id="goproOverlay">
    <div class="modal">
        <button class="btn-close" onclick="closeGoProModal()">X</button>
        <h2>Go Pro</h2>

        <div class="modal-line">
            <label for="card-number">Card Number</label>
            <input type="number" id="card-number" value="4242424242424242">
        </div>
        <div class="modal-line">
            <label for="card-cvv">CVV</label>
            <input type="number" id="card-cvv" value="123">
        </div>
        <div class="modal-line">
            <strong id="value" class="field-value">499 kr</strong>
        </div>
        <button class="btn-pay" onclick="handlePayment()">Pay</button>
        <p class="payment-error" id="payment-error"></p>
    </div>
</div>

<div class="modal-overlay" id="settingsOverlay">
    <div class="modal">
        <button class="btn-close" onclick="closeSettingsModal()">X</button>
        <span class="material-icons">settings</span>

        <div class="search-wrapper">
        <span class="material-icons search-icon">search</span>
        <input type="text" id="settings-search" placeholder="Search settings...">
        </div>

        <p class="settings-label">Account</p>
        <div class="settings-row">
            <span>Email</span>
            <span id="emailSettings" class="settings-value"></span>
        </div>

        <p class="settings-label">Apperance</p>
        <div class="settings-row">
            <span>Light Mode</span>
            <label class="toggle">
                <input type="checkbox" id="darkmode-toggle" onchange="toggleLightMode(this)">
                <span class="toggle-thumb"></span>
            </label>
        </div>

        <p class="settings-label">Plan</p>
        <div class="settings-row">
            <span>Current plan</span>
            <span id="currentPlan"></span>
        </div>
        <button class="btn-login" id="settingsGoPro" onclick="openGoProModal()">Upgrade to Pro</button>
    </div>
</div>


<section class="calculator-slider-section">
    <div class="calculator-slider">

        <div class="slides-container">

            <div class="slide" id="calc-slide-1">
                <section id="calculatorSection" class="calculatorSection" data-state="loaded"></section>
            </div>

            <div class="slide" id="calc-slide-2">
            </div>

        </div>

        <button class="arrow left">&#10094;</button>
        <button class="arrow right">&#10095;</button>

        <div class="dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
        </div>

    </div>
</section>

</body>

<script src="main.js"></script>
<script src="modal.js"></script>
<script type="module" src="state.js"></script>

</html>
